<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>BOT M5 FINAL</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}
#status{margin:20px;font-size:18px;}
#log{
  max-width:400px;
  margin:auto;
  text-align:left;
  font-size:14px;
}
</style>
</head>

<body>

<h1>🔥 BOT M5 ONLINE</h1>
<div id="status">Iniciando...</div>
<div id="log"></div>

<script>

// 🔑 CONFIGURE AQUI
const API_KEY = "6b5dcef2d9d240088bef2f844e31df7e";
const BOT_TOKEN = "8706007658:AAFOO5z6FmPMXq4tXa6F6Ybj83KCeH1iowk";
const CHAT_ID = "7279659759";

// 🔥 PARES
const pairs = ["EUR/USD","GBP/USD","USD/JPY","AUD/USD","USD/CAD"];

let lastSignals = {};

// ===== TELEGRAM =====
async function sendTelegram(msg){
  try{
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

    const res = await fetch(url,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        chat_id: CHAT_ID,
        text: msg
      })
    });

    const data = await res.json();

    if(!data.ok){
      console.log("Erro Telegram:", data);
    }

  }catch(e){
    console.log("Erro envio:", e);
  }
}

// ===== FETCH =====
async function getPrices(symbol){
  try{
    const url =
      `https://api.twelvedata.com/time_series?symbol=${symbol}&interval=5min&outputsize=100&apikey=${API_KEY}`;

    const res = await fetch(url);
    const data = await res.json();

    if(!data.values) return [];

    return data.values.map(v=>parseFloat(v.close)).reverse();

  }catch{
    return [];
  }
}

// ===== EMA =====
function EMA(p,n){
  const k=2/(n+1);
  let e=[p[0]];
  for(let i=1;i<p.length;i++){
    e.push(p[i]*k + e[i-1]*(1-k));
  }
  return e;
}

// ===== RSI =====
function RSI(p){
  let g=0,l=0;
  for(let i=p.length-14;i<p.length;i++){
    let d=p[i]-p[i-1];
    if(d>0) g+=d;
    else l-=d;
  }
  let rs=g/(l||1);
  return 100-100/(1+rs);
}

// ===== SINAL =====
function signal(p){

  if(p.length < 50) return null;

  const price = p.at(-1);
  const ema50 = EMA(p,50).at(-1);
  const rsi = RSI(p);

  // 🔥 MAIS FORTE (gera sinal)
  if(price > ema50 && rsi > 55){
    return "BUY";
  }

  if(price < ema50 && rsi < 45){
    return "SELL";
  }

  return null;
}

// ===== LOOP =====
async function runBot(){

  document.getElementById("status").innerText = "Rodando...";

  let logHTML = "";

  for(const symbol of pairs){

    const prices = await getPrices(symbol);

    if(prices.length < 50){
      logHTML += `⚠️ ${symbol} sem dados<br>`;
      continue;
    }

    const sig = signal(prices);

    if(sig){

      if(lastSignals[symbol] === sig) continue;

      lastSignals[symbol] = sig;

      const msg =
        `${sig === "BUY" ? "📈 COMPRA" : "📉 VENDA"} M5\n${symbol}`;

      logHTML += msg + "<br>";

      // 🔥 ENVIO GARANTIDO
      await sendTelegram(msg);

    }else{
      logHTML += `⏸️ ${symbol}<br>`;
    }
  }

  document.getElementById("log").innerHTML = logHTML;
}

// roda SEMPRE
setInterval(runBot,15000);

</script>

</body>
</html>
