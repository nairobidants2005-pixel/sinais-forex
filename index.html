<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Bot M5 Seguro</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#0f172a;
  color:white;
}

#timer{ font-size:22px; margin:20px; }
#signal{
  font-size:28px;
  padding:20px;
  margin:20px;
  border-radius:10px;
  background:gray;
}
select{
  padding:10px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>📊 BOT M5</h1>

<div id="timer">Iniciando...</div>

<select id="pair">
  <option value="EUR/USD">EUR/USD</option>
  <option value="GBP/USD">GBP/USD</option>
  <option value="USD/JPY">USD/JPY</option>
</select>

<div id="signal">⏸️ AGUARDANDO</div>

<script>

const API_KEY = "6b5dcef2d9d240088bef2f844e31df7e";

// ===== TIMER =====
function updateTimer(){
  try{
    const now = new Date();
    const sec = now.getSeconds();
    const min = now.getMinutes();

    const remaining = (5 - (min % 5)) * 60 - sec;

    document.getElementById("timer").innerText =
      "Próxima vela M5 em: " + remaining + "s";
  }catch(e){
    console.log("Erro timer:", e);
  }
}

setInterval(updateTimer,1000);

// ===== FETCH =====
async function getPrices(symbol){
  try{
    const url = `https://api.twelvedata.com/time_series?symbol=${symbol}&interval=5min&outputsize=120&apikey=${API_KEY}`;

    const res = await fetch(url);

    if(!res.ok){
      throw new Error("Erro HTTP: " + res.status);
    }

    const data = await res.json();

    if(!data.values){
      console.log("Erro API:", data);
      return [];
    }

    return data.values.map(v=>parseFloat(v.close)).reverse();

  }catch(e){
    console.log("Erro fetch:", e);
    return [];
  }
}

// ===== EMA =====
function EMA(p,n){
  if(p.length === 0) return [];
  const k=2/(n+1);
  let e=[p[0]];
  for(let i=1;i<p.length;i++){
    e.push(p[i]*k + e[i-1]*(1-k));
  }
  return e;
}

// ===== RSI =====
function RSI(p,n=14){
  if(p.length < n+1) return 50;

  let g=0,l=0;

  for(let i=p.length-n;i<p.length;i++){
    let d=p[i]-p[i-1];
    if(d>0) g+=d;
    else l-=d;
  }

  let rs=g/(l||1);
  return 100-100/(1+rs);
}

// ===== SINAL =====
function signal(p){

  if(p.length < 60) return null;

  const price = p[p.length-1];
  const ema10 = EMA(p,10);
  const ema50 = EMA(p,50);
  const rsi = RSI(p);

  if(ema10.length === 0 || ema50.length === 0) return null;

  const trendUp = price > ema50.at(-1);
  const trendDown = price < ema50.at(-1);

  const pullbackBuy = price <= ema10.at(-1);
  const pullbackSell = price >= ema10.at(-1);

  if(trendUp && pullbackBuy && rsi > 50){
    return "BUY";
  }

  if(trendDown && pullbackSell && rsi < 50){
    return "SELL";
  }

  return null;
}

// ===== UPDATE =====
async function update(){

  try{
    const now = new Date();
    const sec = now.getSeconds();
    const min = now.getMinutes();

    if(min % 5 !== 4 || sec < 50) return;

    const symbol = document.getElementById("pair").value;
    const prices = await getPrices(symbol);

    if(prices.length < 60){
      document.getElementById("signal").innerText = "⚠️ SEM DADOS";
      return;
    }

    const sig = signal(prices);
    const el = document.getElementById("signal");

    if(sig==="BUY"){
      el.innerText="📈 COMPRA M5";
      el.style.background="green";
    }
    else if(sig==="SELL"){
      el.innerText="📉 VENDA M5";
      el.style.background="red";
    }
    else{
      el.innerText="⏸️ AGUARDANDO";
      el.style.background="gray";
    }

  }catch(e){
    console.log("Erro update:", e);
  }
}

setInterval(update,1000);

</script>

</body>
</html>
