<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sinais Forex Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; background: #121212; color: #fff; text-align: center; }
    h1 { margin-top: 20px; }
    #signal { font-size: 28px; margin: 20px 0; }
    #chart { max-width: 90%; margin: 0 auto; }
  </style>
</head>
<body>
  <h1>Sinais Forex Demo</h1>
  <p id="signal">Carregando sinais...</p>
  <canvas id="chart" width="600" height="300"></canvas>

  <script>
    const API_KEY = "6b5dcef2d9d240088bef2f844e31df7e"; // Substitua pela sua API Key
    const SYMBOL = "EUR/USD";
    let chart;

    async function fetchPrices() {
      const res = await fetch(`https://api.twelvedata.com/time_series?symbol=${SYMBOL}&interval=1min&outputsize=50&apikey=${API_KEY}`);
      const data = await res.json();
      return data.values.map(v => parseFloat(v.close)).reverse();
    }

    function SMA(prices, period=10){
      return prices.map((v,i,arr) => i < period-1 ? null : arr.slice(i-period+1,i+1).reduce((a,b)=>a+b,0)/period);
    }

    function EMA(prices, period=10){
      const k = 2/(period+1);
      let ema = [prices[0]];
      for(let i=1;i<prices.length;i++){
        ema.push(prices[i]*k + ema[i-1]*(1-k));
      }
      return ema;
    }

    function generateSignal(prices){
      const sma = SMA(prices,10).filter(v => v !== null);
      const ema = EMA(prices,10);
      const lastPrice = prices[prices.length-1];
      const lastSMA = sma[sma.length-1];
      const lastEMA = ema[ema.length-1];

      if(lastPrice > lastSMA && lastPrice > lastEMA) return "📈 COMPRA";
      if(lastPrice < lastSMA && lastPrice < lastEMA) return "📉 VENDA";
      return "↔️ Sem tendência clara";
    }

    async function update(){
      const prices = await fetchPrices();
      const signal = generateSignal(prices);
      document.getElementById("signal").innerText = signal;

      if(chart) chart.destroy();
      chart = new Chart(document.getElementById("chart"),{
        type:'line',
        data:{
          labels: prices.map((_,i)=>i),
          datasets:[
            {label:'Preço', data: prices, borderColor:'cyan', fill:false},
            {label:'SMA10', data:SMA(prices,10), borderColor:'yellow', fill:false},
            {label:'EMA10', data:EMA(prices,10), borderColor:'magenta', fill:false}
          ]
        }
      });
    }

    update();
    setInterval(update,60000);
  </script>
</body>
</html>
