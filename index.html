<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Bot M5 FUNCIONANDO</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#0f172a;
  color:white;
}
#timer{font-size:20px;margin:15px;}
#signal{
  font-size:28px;
  padding:20px;
  margin:20px;
  border-radius:10px;
  background:gray;
}
</style>
</head>

<body>

<h1>🔥 BOT M5 ATIVO</h1>

<div id="timer"></div>
<div id="signal">⏸️ INICIANDO...</div>

<script>

const API_KEY = "6b5dcef2d9d240088bef2f844e31df7e";

// ===== TIMER =====
setInterval(()=>{
  const now = new Date();
  document.getElementById("timer").innerText =
    "Hora: " + now.toLocaleTimeString();
},1000);

// ===== FETCH =====
async function getPrices(){
  try{
    const res = await fetch(
      `https://api.twelvedata.com/time_series?symbol=EUR/USD&interval=5min&outputsize=100&apikey=${API_KEY}`
    );
    const data = await res.json();
    if(!data.values) return [];
    return data.values.map(v=>parseFloat(v.close)).reverse();
  }catch{
    return [];
  }
}

// ===== EMA =====
function EMA(p,n){
  const k=2/(n+1);
  let e=[p[0]];
  for(let i=1;i<p.length;i++){
    e.push(p[i]*k + e[i-1]*(1-k));
  }
  return e;
}

// ===== RSI =====
function RSI(p){
  let g=0,l=0;
  for(let i=p.length-14;i<p.length;i++){
    let d=p[i]-p[i-1];
    if(d>0) g+=d;
    else l-=d;
  }
  let rs=g/(l||1);
  return 100-100/(1+rs);
}

// ===== NOVA LÓGICA (MAIS SINAIS) =====
function signal(p){

  if(p.length < 50) return "AGUARDANDO";

  const price = p.at(-1);
  const ema10 = EMA(p,10).at(-1);
  const ema50 = EMA(p,50).at(-1);
  const rsi = RSI(p);

  // 🔥 mais agressivo (gera sinal mesmo)
  if(price > ema50 && rsi > 55){
    return "BUY";
  }

  if(price < ema50 && rsi < 45){
    return "SELL";
  }

  return "NEUTRO";
}

// ===== LOOP =====
setInterval(async ()=>{

  const prices = await getPrices();

  if(prices.length === 0){
    document.getElementById("signal").innerText = "⚠️ ERRO API";
    return;
  }

  const sig = signal(prices);
  const el = document.getElementById("signal");

  if(sig==="BUY"){
    el.innerText="📈 COMPRA";
    el.style.background="green";
  }
  else if(sig==="SELL"){
    el.innerText="📉 VENDA";
    el.style.background="red";
  }
  else{
    el.innerText="⏸️ AGUARDANDO";
    el.style.background="gray";
  }

},10000);

</script>

</body>
</html>
