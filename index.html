<body>

<h1>Sinais Forex Completo</h1>

<select id="pairSelect">
<option value="EUR/USD">EUR/USD</option>
<option value="GBP/USD">GBP/USD</option>

<canvas id="chart" width="600" height="300"></canvas>

<script>

// ---------- CONFIGURAÇÃO ----------
const API_KEY = "6b5dcef2d9d240088bef2f844e31df7e";
const TELEGRAM_TOKEN = "8706007658:AAFOO5z6FmPMXq4tXa6F6Ybj83KCeH1iowk";
const CHAT_ID = "7279659759";

const INTERVAL = 60000;
let chart, countdown = INTERVAL/1000;
let lastSignal = "";

const pairSelect = document.getElementById("pairSelect");
const timerElem = document.getElementById("timer");
const signalElem = document.getElementById("signal");

// ---------- TELEGRAM ----------
function sendTelegramAlert(message){
  if(!TELEGRAM_TOKEN || !CHAT_ID) return;

  fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      chat_id: CHAT_ID,
      text: message
    })
  }).catch(err => console.error("Erro Telegram:", err));
}

// ---------- DADOS ----------
async function fetchPrices(symbol){
  try{
    const res = await fetch(`https://api.twelvedata.com/time_series?symbol=${symbol}&interval=1min&outputsize=50&apikey=${API_KEY}`);
    const data = await res.json();

    if(!data.values) throw new Error("Erro API");

    return data.values.map(v => parseFloat(v.close)).reverse();

  }catch(e){
    console.error("Erro ao buscar preços:", e);
    signalElem.innerText = "Erro ao carregar dados";
    return [];
  }
}

// ---------- INDICADORES ----------
function SMA(prices, period=10){
  return prices.map((v,i,arr)=>
    i<period-1 ? null :
    arr.slice(i-period+1,i+1).reduce((a,b)=>a+b,0)/period
  );
}

function EMA(prices, period=10){
  const k = 2/(period+1);
  let ema=[prices[0]];
  for(let i=1;i<prices.length;i++){
    ema.push(prices[i]*k + ema[i-1]*(1-k));
  }
  return ema;
}

function RSI(prices, period=14){
  let gains=[], losses=[];
  for(let i=1;i<prices.length;i++){
    let diff=prices[i]-prices[i-1];
    gains.push(diff>0?diff:0);
    losses.push(diff<0?-diff:0);
  }

  let avgGain=gains.slice(0,period).reduce((a,b)=>a+b,0)/period;
  let avgLoss=losses.slice(0,period).reduce((a,b)=>a+b,0)/period;

  let rsi=[100 - 100/(1+(avgGain/avgLoss || 1))];

  for(let i=period;i<gains.length;i++){
    avgGain=(avgGain*(period-1)+gains[i])/period;
    avgLoss=(avgLoss*(period-1)+losses[i])/period;
    rsi.push(100 - 100/(1+(avgGain/avgLoss || 1)));
  }

  return rsi;
}

function MACD(prices, shortPeriod=12,longPeriod=26,signalPeriod=9){
  const emaShort=EMA(prices,shortPeriod);
  const emaLong=EMA(prices,longPeriod);

  const macdLine=emaShort.map((v,i)=>v-emaLong[i]);
  const signalLine=EMA(macdLine,signalPeriod);

  return {macdLine, signalLine};
}

// ---------- SINAL ----------
function generateSignal(prices){

  if(prices.length < 30) return "⏳ Sem dados suficientes";

  const ema=EMA(prices,10);
  const sma=SMA(prices,10).filter(v=>v!==null);
  const rsi=RSI(prices).slice(-1)[0];

  const macdObj=MACD(prices);
  const macd=macdObj.macdLine.slice(-1)[0];
  const signalLine=macdObj.signalLine.slice(-1)[0];

  const lastPrice=prices[prices.length-1];
  const lastSMA=sma[sma.length-1];
  const lastEMA=ema[ema.length-1];

  let signal="↔️ LATERAL";

  if(lastPrice>lastSMA && lastPrice>lastEMA && rsi<70 && macd>signalLine)
    signal="📈 COMPRA";

  else if(lastPrice<lastSMA && lastPrice<lastEMA && rsi>30 && macd<signalLine)
    signal="📉 VENDA";

  return signal;
}

// ---------- UPDATE ----------
async function update(symbol=pairSelect.value){

  const prices = await fetchPrices(symbol);

  if(prices.length < 30){
    signalElem.innerText = "Sem dados suficientes";
    return;
  }

  const signal = generateSignal(prices);

  // UI
  signalElem.innerText = signal;

  if(signal.includes("COMPRA")) signalElem.style.backgroundColor="green";
  else if(signal.includes("VENDA")) signalElem.style.backgroundColor="red";
  else signalElem.style.backgroundColor="gray";

  // TELEGRAM (sem spam)
  if(signal !== lastSignal && (signal.includes("COMPRA") || signal.includes("VENDA"))){
    sendTelegramAlert(`${signal} no par ${symbol}`);
    lastSignal = signal;
  }

  // GRÁFICO
  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:'line',
    data:{
      labels: prices.map((_,i)=>i),
      datasets:[
        {label:'Preço', data:prices, borderColor:'cyan', fill:false},
        {label:'SMA10', data:SMA(prices,10), borderColor:'yellow', fill:false},
        {label:'EMA10', data:EMA(prices,10), borderColor:'magenta', fill:false}
      ]
    }
  });

  countdown = INTERVAL/1000;
}

// ---------- TIMER ----------
setInterval(()=>{
  countdown--;
  if(countdown<0) countdown = INTERVAL/1000;
  timerElem.innerText = `Próxima atualização em: ${countdown}s`;
},1000);

// ---------- START ----------
update();
setInterval(()=>update(pairSelect.value), INTERVAL);

</script>

</body>
