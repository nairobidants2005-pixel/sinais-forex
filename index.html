<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Bot M5 + Telegram</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#0f172a;
  color:white;
}

h1{ margin-top:20px; }

#timer{
  font-size:20px;
  margin:15px;
}

#log{
  margin-top:20px;
  font-size:14px;
  max-width:400px;
  margin:auto;
  text-align:left;
}
</style>
</head>

<body>

<h1>🔥 BOT M5 + TELEGRAM</h1>

<div id="timer"></div>

<div id="log">Iniciando...</div>

<script>

// 🔑 CONFIGURAÇÕES
const API_KEY = "6b5dcef2d9d240088bef2f844e31df7e";
const BOT_TOKEN = "8706007658:AAFOO5z6FmPMXq4tXa6F6Ybj83KCeH1iowk";
const CHAT_ID = "7279659759";

// 🔥 PARIDADES
const pairs = [
  "EUR/USD","GBP/USD","USD/JPY",
  "AUD/USD","USD/CAD","EUR/GBP"
];

// CONTROLE DE SPAM
let lastSignals = {};

// ===== TIMER =====
setInterval(()=>{
  const now = new Date();
  document.getElementById("timer").innerText =
    "⏱️ " + now.toLocaleTimeString();
},1000);

// ===== TELEGRAM =====
async function sendTelegram(msg){
  try{
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        chat_id: CHAT_ID,
        text: msg
      })
    });
  }catch(e){
    console.log("Erro Telegram:", e);
  }
}

// ===== FETCH =====
async function getPrices(symbol){
  try{
    const res = await fetch(
      `https://api.twelvedata.com/time_series?symbol=${symbol}&interval=5min&outputsize=100&apikey=${API_KEY}`
    );
    const data = await res.json();
    if(!data.values) return [];
    return data.values.map(v=>parseFloat(v.close)).reverse();
  }catch{
    return [];
  }
}

// ===== EMA =====
function EMA(p,n){
  const k=2/(n+1);
  let e=[p[0]];
  for(let i=1;i<p.length;i++){
    e.push(p[i]*k + e[i-1]*(1-k));
  }
  return e;
}

// ===== RSI =====
function RSI(p){
  let g=0,l=0;
  for(let i=p.length-14;i<p.length;i++){
    let d=p[i]-p[i-1];
    if(d>0) g+=d;
    else l-=d;
  }
  let rs=g/(l||1);
  return 100-100/(1+rs);
}

// ===== SINAL =====
function signal(p){

  if(p.length < 50) return null;

  const price = p.at(-1);
  const ema10 = EMA(p,10).at(-1);
  const ema50 = EMA(p,50).at(-1);
  const rsi = RSI(p);

  if(price > ema50 && rsi > 55){
    return "BUY";
  }

  if(price < ema50 && rsi < 45){
    return "SELL";
  }

  return null;
}

// ===== LOOP PRINCIPAL =====
setInterval(async ()=>{

  let logText = "";

  for(const symbol of pairs){

    const prices = await getPrices(symbol);
    if(prices.length === 0) continue;

    const sig = signal(prices);

    if(sig){

      // evitar repetir
      if(lastSignals[symbol] === sig) continue;

      lastSignals[symbol] = sig;

      const msg =
        `${sig === "BUY" ? "📈 COMPRA" : "📉 VENDA"} M5\n${symbol}`;

      // mostra na tela
      logText += msg + "<br>";

      // envia telegram
      sendTelegram(msg);
    }
  }

  if(logText === "") logText = "⏸️ Aguardando sinais...";

  document.getElementById("log").innerHTML = logText;

},15000);

</script>

</body>
</html>
