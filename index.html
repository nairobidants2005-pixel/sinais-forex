<script>

const API_KEY = "6b5dcef2d9d240088bef2f844e31df7e";

// ===== TIMER M5 REAL =====
function updateTimer(){
  const now = new Date();
  const sec = now.getSeconds();
  const min = now.getMinutes();

  const remaining = (5 - (min % 5)) * 60 - sec;

  document.getElementById("timer").innerText =
    "Próxima vela M5 em: " + remaining + "s";
}
setInterval(updateTimer,1000);

// ===== FETCH M5 =====
async function getPrices(symbol){
  const res = await fetch(
    `https://api.twelvedata.com/time_series?symbol=${symbol}&interval=5min&outputsize=120&apikey=${API_KEY}`
  );
  const data = await res.json();
  return data.values.map(v=>parseFloat(v.close)).reverse();
}

// ===== INDICADORES =====
function EMA(p,n){
  const k=2/(n+1);
  let e=[p[0]];
  for(let i=1;i<p.length;i++)
    e.push(p[i]*k + e[i-1]*(1-k));
  return e;
}

function RSI(p,n=14){
  let g=0,l=0;
  for(let i=p.length-n;i<p.length;i++){
    let d=p[i]-p[i-1];
    if(d>0) g+=d;
    else l-=d;
  }
  let rs=g/(l||1);
  return 100-100/(1+rs);
}

// ===== SINAL PROFISSIONAL =====
function signal(p){

  const price = p[p.length-1];
  const ema10 = EMA(p,10);
  const ema50 = EMA(p,50);

  const rsi = RSI(p);

  const trendUp = price > ema50.at(-1);
  const trendDown = price < ema50.at(-1);

  const pullbackBuy = price <= ema10.at(-1);
  const pullbackSell = price >= ema10.at(-1);

  // ===== BUY =====
  if(trendUp && pullbackBuy && rsi > 50){
    return "BUY";
  }

  // ===== SELL =====
  if(trendDown && pullbackSell && rsi < 50){
    return "SELL";
  }

  return null;
}

// ===== UPDATE =====
async function update(){

  const now = new Date();
  const sec = now.getSeconds();
  const min = now.getMinutes();

  // EXECUTA SOMENTE NO FECHAMENTO M5
  if((min % 5 !== 4) || sec < 55) return;

  const symbol = document.getElementById("pair").value;
  const prices = await getPrices(symbol);

  const sig = signal(prices);

  const el = document.getElementById("signal");

  if(sig==="BUY"){
    el.innerText="📈 COMPRA M5";
    el.style.background="green";
  }
  else if(sig==="SELL"){
    el.innerText="📉 VENDA M5";
    el.style.background="red";
  }
  else{
    el.innerText="⏸️ AGUARDANDO";
    el.style.background="gray";
  }
}

setInterval(update,1000);

</script>
