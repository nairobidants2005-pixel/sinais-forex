<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sinais Forex Multi-Pares</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: Arial; background:#121212; color:#fff; text-align:center; }
  h1 { margin-top:20px; }
  #signal { font-size:28px; margin:20px 0; padding:10px; border-radius:5px; display:inline-block; }
  #chart { max-width:90%; margin:0 auto; }
  select { padding:5px 10px; font-size:16px; margin-top:10px; }
</style>
</head>
<body>
<h1>Sinais Forex Multi-Pares</h1>
<select id="pairSelect">
  <option value="EUR/USD">EUR/USD</option>
  <option value="GBP/USD">GBP/USD</option>
  <option value="USD/JPY">USD/JPY</option>
  <option value="AUD/USD">AUD/USD</option>
  <option value="USD/CHF">USD/CHF</option>
</select>
<p id="signal">Carregando sinais...</p>
<canvas id="chart" width="600" height="300"></canvas>

<script>
const API_KEY = "6b5dcef2d9d240088bef2f844e31df7e"; // Coloque sua chave da API aqui
let chart;
const pairSelect = document.getElementById("pairSelect");

pairSelect.addEventListener("change", ()=>update(pairSelect.value));

async function fetchPrices(symbol){
  const res = await fetch(`https://api.twelvedata.com/time_series?symbol=${symbol}&interval=1min&outputsize=50&apikey=${API_KEY}`);
  const data = await res.json();
  return data.values.map(v=>parseFloat(v.close)).reverse();
}

// Indicadores
function SMA(prices, period=10){
  return prices.map((v,i,arr)=>i<period-1 ? null : arr.slice(i-period+1,i+1).reduce((a,b)=>a+b,0)/period);
}
function EMA(prices, period=10){
  const k = 2/(period+1);
  let ema=[prices[0]];
  for(let i=1;i<prices.length;i++) ema.push(prices[i]*k + ema[i-1]*(1-k));
  return ema;
}
function RSI(prices, period=14){
  let gains=[], losses=[];
  for(let i=1;i<prices.length;i++){
    let diff=prices[i]-prices[i-1];
    if(diff>=0) gains.push(diff), losses.push(0);
    else gains.push(0), losses.push(-diff);
  }
  let avgGain=gains.slice(0,period).reduce((a,b)=>a+b,0)/period;
  let avgLoss=losses.slice(0,period).reduce((a,b)=>a+b,0)/period;
  let rsi=[100 - 100/(1+avgGain/avgLoss)];
  for(let i=period;i<gains.length;i++){
    avgGain=(avgGain*(period-1)+gains[i])/period;
    avgLoss=(avgLoss*(period-1)+losses[i])/period;
    rsi.push(100 - 100/(1+avgGain/avgLoss));
  }
  return rsi;
}
function MACD(prices, shortPeriod=12,longPeriod=26,signalPeriod=9){
  const emaShort=EMA(prices,shortPeriod);
  const emaLong=EMA(prices,longPeriod);
  const macdLine=emaShort.map((v,i)=>v-emaLong[i]);
  const signalLine=EMA(macdLine.slice(longPeriod-1),signalPeriod);
  return {macdLine, signalLine};
}

// Sinal
function generateSignal(prices){
  const ema=EMA(prices,10);
  const sma=SMA(prices,10).filter(v=>v!==null);
  const rsi=RSI(prices).slice(-1)[0];
  const macdObj=MACD(prices);
  const macd=macdObj.macdLine.slice(-1)[0];
  const signalLine=macdObj.signalLine.slice(-1)[0];
  const lastPrice=prices[prices.length-1];
  const lastSMA=sma[sma.length-1];
  const lastEMA=ema[ema.length-1];

  let signal="↔️ Sem tendência clara";
  if(lastPrice>lastSMA && lastPrice>lastEMA && rsi<70 && macd>signalLine) signal="📈 COMPRA";
  else if(lastPrice<lastSMA && lastPrice<lastEMA && rsi>30 && macd<signalLine) signal="📉 VENDA";
  return signal;
}

// Atualiza sinais e gráfico
async function update(symbol=pairSelect.value){
  const prices = await fetchPrices(symbol);
  const signal = generateSignal(prices);
  const signalElem=document.getElementById("signal");
  signalElem.innerText=signal;
  if(signal.includes("COMPRA")) { signalElem.style.backgroundColor="green"; alert("📈 COMPRA!"); }
  else if(signal.includes("VENDA")) { signalElem.style.backgroundColor="red"; alert("📉 VENDA!"); }
  else signalElem.style.backgroundColor="yellow";

  if(chart) chart.destroy();
  chart = new Chart(document.getElementById("chart"),{
    type:'line',
    data:{
      labels: prices.map((_,i)=>i),
      datasets:[
        {label:'Preço', data:prices, borderColor:'cyan', fill:false},
        {label:'SMA10', data:SMA(prices,10), borderColor:'yellow', fill:false},
        {label:'EMA10', data:EMA(prices,10), borderColor:'magenta', fill:false}
      ]
    }
  });
}

// Atualização inicial e repetida
update();
setInterval(()=>update(pairSelect.value),60000);
</script>
</body>
</html>
